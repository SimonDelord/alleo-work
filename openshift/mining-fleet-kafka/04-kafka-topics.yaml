# Fleet orchestration topics in dedicated mining-fleet-kafka namespace.
---
apiVersion: kafka.strimzi.io/v1beta2
kind: KafkaTopic
metadata:
  name: fleet-trucks-telemetry
  namespace: mining-fleet-kafka
  labels:
    strimzi.io/cluster: mining-fleet-cluster
spec:
  topicName: fleet.trucks.telemetry
  partitions: 3
  replicas: 3
  config:
    retention.ms: "604800000"
    min.insync.replicas: 2
---
apiVersion: kafka.strimzi.io/v1beta2
kind: KafkaTopic
metadata:
  name: fleet-crushers-state
  namespace: mining-fleet-kafka
  labels:
    strimzi.io/cluster: mining-fleet-cluster
spec:
  topicName: fleet.crushers.state
  partitions: 2
  replicas: 3
  config:
    retention.ms: "604800000"
    min.insync.replicas: 2
---
