# In-cluster builds for truck-fleet (namespace truck-fleet). Adjust git.uri to your fork.
# After apply: oc start-build truck-agent mqtt-ingest -n truck-fleet --wait
# Images: image-registry.openshift-image-registry.svc:5000/truck-fleet/<name>:latest
---
apiVersion: image.openshift.io/v1
kind: ImageStream
metadata:
  name: truck-agent
  namespace: truck-fleet
spec: {}
---
apiVersion: build.openshift.io/v1
kind: BuildConfig
metadata:
  name: truck-agent
  namespace: truck-fleet
  labels:
    app: truck-agent
spec:
  failedBuildsHistoryLimit: 3
  successfulBuildsHistoryLimit: 3
  source:
    type: Git
    git:
      uri: https://github.com/SimonDelord/alleo-work.git
      ref: main
    contextDir: poc/truck-fleet
  strategy:
    type: Docker
    dockerStrategy:
      dockerfilePath: Dockerfile.truck-agent
  output:
    to:
      kind: ImageStreamTag
      name: truck-agent:latest
  triggers:
    - type: ConfigChange
---
apiVersion: image.openshift.io/v1
kind: ImageStream
metadata:
  name: mqtt-ingest
  namespace: truck-fleet
spec: {}
---
apiVersion: build.openshift.io/v1
kind: BuildConfig
metadata:
  name: mqtt-ingest
  namespace: truck-fleet
  labels:
    app: mqtt-ingest
spec:
  failedBuildsHistoryLimit: 3
  successfulBuildsHistoryLimit: 3
  source:
    type: Git
    git:
      uri: https://github.com/SimonDelord/alleo-work.git
      ref: main
    contextDir: poc/truck-fleet
  strategy:
    type: Docker
    dockerStrategy:
      dockerfilePath: Dockerfile.mqtt-ingest
  output:
    to:
      kind: ImageStreamTag
      name: mqtt-ingest:latest
  triggers:
    - type: ConfigChange
