# Synthetic CSV generator + S3 upload for namespace kafka-demo
#
# Bucket: arn:aws:s3:::simon-kafka-csv-demo
# Use the same S3_KEY as the s3-csv-producer worker so each upload overwrites
# the object, ETag changes, and the Kafka forwarder re-processes the file.
#
# IAM: s3:PutObject on object ARNs under the bucket. Credentials: Secret aws-s3-csv-creds (or IRSA).
# Build the image on-cluster: oc apply -f openshift/BuildConfig-s3-csv-uploader.yaml && oc start-build s3-csv-uploader -n kafka-demo
# Apply: oc apply -n kafka-demo -f s3-csv-uploader-kafka-demo.yaml
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: s3-csv-uploader-env
  namespace: kafka-demo
data:
  S3_BUCKET: "simon-kafka-csv-demo"
  S3_KEY: "uploads/sample.csv"
  AWS_DEFAULT_REGION: "us-east-1"
  # fleet = embedded telematics CSV; random = tiny dev schema (see s3_csv_uploader.py)
  CSV_MODE: "fleet"
  BUMP_TIMESTAMPS: "1"
  UPLOAD_INTERVAL_SEC: "45"
  # Only for CSV_MODE=random
  CSV_ROW_COUNT: "5"
  AWS_ENDPOINT_URL: ""
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: s3-csv-uploader
  namespace: kafka-demo
  labels:
    app: s3-csv-uploader
spec:
  replicas: 1
  selector:
    matchLabels:
      app: s3-csv-uploader
  template:
    metadata:
      labels:
        app: s3-csv-uploader
    spec:
      serviceAccountName: s3-csv-uploader
      containers:
        - name: s3-csv-uploader
          # After in-cluster build: image-registry.openshift-image-registry.svc:5000/kafka-demo/s3-csv-uploader:latest
          image: image-registry.openshift-image-registry.svc:5000/kafka-demo/s3-csv-uploader:latest
          imagePullPolicy: IfNotPresent
          envFrom:
            - configMapRef:
                name: s3-csv-uploader-env
          env:
            - name: AWS_ACCESS_KEY_ID
              valueFrom:
                secretKeyRef:
                  name: aws-s3-csv-creds
                  key: AWS_ACCESS_KEY_ID
            - name: AWS_SECRET_ACCESS_KEY
              valueFrom:
                secretKeyRef:
                  name: aws-s3-csv-creds
                  key: AWS_SECRET_ACCESS_KEY
          resources:
            requests:
              cpu: 20m
              memory: 64Mi
            limits:
              memory: 128Mi
---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: s3-csv-uploader
  namespace: kafka-demo
