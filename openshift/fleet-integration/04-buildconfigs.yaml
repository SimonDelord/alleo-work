# In-cluster builds for fleet-integration.
# After apply: oc start-build kafka-truck-bridge destination-router mqtt-routing-bridge crusher-fill-bridge crusher-capacity-monitor -n fleet-integration --wait
---
apiVersion: image.openshift.io/v1
kind: ImageStream
metadata:
  name: kafka-truck-bridge
  namespace: fleet-integration
spec: {}
---
apiVersion: build.openshift.io/v1
kind: BuildConfig
metadata:
  name: kafka-truck-bridge
  namespace: fleet-integration
  labels:
    app: kafka-truck-bridge
spec:
  failedBuildsHistoryLimit: 3
  successfulBuildsHistoryLimit: 3
  source:
    type: Git
    git:
      uri: https://github.com/SimonDelord/alleo-work.git
      ref: main
    contextDir: poc/fleet-integration
  strategy:
    type: Docker
    dockerStrategy:
      dockerfilePath: Dockerfile.kafka-truck-bridge
  output:
    to:
      kind: ImageStreamTag
      name: kafka-truck-bridge:latest
  triggers:
    - type: ConfigChange
