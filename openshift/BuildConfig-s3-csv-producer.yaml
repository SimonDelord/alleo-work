# In-cluster build: poc/csv/Dockerfile.s3-csv → s3-csv-producer:latest
---
apiVersion: image.openshift.io/v1
kind: ImageStream
metadata:
  name: s3-csv-producer
  namespace: kafka-demo
spec: {}
---
apiVersion: build.openshift.io/v1
kind: BuildConfig
metadata:
  name: s3-csv-producer
  namespace: kafka-demo
  labels:
    app: s3-csv-producer
spec:
  failedBuildsHistoryLimit: 3
  successfulBuildsHistoryLimit: 3
  source:
    type: Git
    git:
      uri: https://github.com/SimonDelord/alleo-work.git
      ref: main
    contextDir: poc/csv
  strategy:
    type: Docker
    dockerStrategy:
      dockerfilePath: Dockerfile.s3-csv
  output:
    to:
      kind: ImageStreamTag
      name: s3-csv-producer:latest
  triggers:
    - type: ConfigChange
