# Shared env for crusher PLCs and historian (non-secret).
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: crusher-fleet-env
  namespace: crusher-fleet
data:
  MODBUS_HOST: "0.0.0.0"
  MODBUS_PORT: "502"
  TICK_SEC: "3.0"
  CAPACITY_FILL_PCT: "90"
  FILL_INCREASE_MIN: "0.5"
  FILL_INCREASE_MAX: "3.0"
  DRAIN_RATE_PCT: "0.3"
  BASE_THROUGHPUT_TPH: "450"
  PGHOST: "postgresql"
  PGPORT: "5432"
  PGDATABASE: "crusherfleet"
  PGUSER: "crusherfleet"
  POLL_SEC: "2.0"
  CRUSHER_TARGETS: "crusher-1:crusher-1:502,crusher-2:crusher-2:502"
---
# Demo credentials — replace in production; not real secrets.
apiVersion: v1
kind: Secret
metadata:
  name: postgresql-credentials
  namespace: crusher-fleet
type: Opaque
stringData:
  POSTGRES_USER: "crusherfleet"
  POSTGRES_PASSWORD: "crusherfleet-demo"
  POSTGRES_DB: "crusherfleet"
  PGPASSWORD: "crusherfleet-demo"
