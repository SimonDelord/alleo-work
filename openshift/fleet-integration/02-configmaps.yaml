# Shared env for fleet-integration orchestration services.
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: fleet-integration-env
  namespace: fleet-integration
data:
  KAFKA_BOOTSTRAP_SERVERS: "my-cluster-kafka-bootstrap.kafka-demo.svc:9092"
  KAFKA_TOPIC_TRUCK_TELEMETRY: "fleet.trucks.telemetry"
  KAFKA_TOPIC_CRUSHER_STATE: "fleet.crushers.state"
  KAFKA_TOPIC_ROUTING_COMMANDS: "fleet.routing.commands"
  MQTT_HOST: "mqtt-broker.truck-fleet.svc"
  MQTT_PORT: "1883"
  MQTT_TOPIC_SUBSCRIBE: "fleet/trucks/+/telemetry"
  MQTT_NEW_DESTINATION_TOPIC: "new-destination"
  ROUTING_SOURCE: "fleet-integration"
  VALID_CRUSHERS: "crusher-1,crusher-2"
  FALLBACK_CRUSHER: "crusher-2"
  CAPACITY_FILL_PCT: "90"
  PUBLISH_INTERVAL_SEC: "10"
---
# Phase 1 demo: mock crusher capacity (replaced by crusher-fleet Kafka producer).
apiVersion: v1
kind: ConfigMap
metadata:
  name: demo-crusher-state
  namespace: fleet-integration
data:
  crushers.yaml: |
    crushers:
      crusher-1:
        status: full
        fill_pct: 95
        at_capacity: true
        max_queue: 3
        current_queue: 4
      crusher-2:
        status: accepting
        fill_pct: 35
        at_capacity: false
        max_queue: 3
        current_queue: 1
