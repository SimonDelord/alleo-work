apiVersion: kafka.strimzi.io/v1
kind: KafkaConnect
metadata:
  name: fleet-cdc-connect
  namespace: mining-fleet-kafka
  annotations:
    strimzi.io/use-connector-resources: "true"
spec:
  version: 4.1.0
  replicas: 1
  bootstrapServers: mining-fleet-cluster-kafka-bootstrap:9092
  groupId: fleet-cdc-connect-cluster
  offsetStorageTopic: fleet-cdc-connect-offsets
  configStorageTopic: fleet-cdc-connect-configs
  statusStorageTopic: fleet-cdc-connect-status
  build:
    output:
      type: docker
      image: image-registry.openshift-image-registry.svc:5000/mining-fleet-kafka/fleet-cdc-connect:latest
    plugins:
      - name: debezium-postgres
        artifacts:
          - type: tgz
            url: https://repo1.maven.org/maven2/io/debezium/debezium-connector-postgres/3.0.7.Final/debezium-connector-postgres-3.0.7.Final-plugin.tar.gz
  config:
    offset.storage.replication.factor: 3
    config.storage.replication.factor: 3
    status.storage.replication.factor: 3
    config.providers: secrets
    config.providers.secrets.class: io.strimzi.kafka.KubernetesSecretConfigProvider
  resources:
    requests:
      cpu: 200m
      memory: 512Mi
    limits:
      cpu: "1"
      memory: 1Gi
