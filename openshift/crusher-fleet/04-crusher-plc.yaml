        - name: crusher-plc
          image: image-registry.openshift-image-registry.svc:5000/crusher-fleet/crusher-plc:latest
          imagePullPolicy: Always
          ports:
            - containerPort: 502
              name: modbus
          envFrom:
            - configMapRef:
                name: crusher-fleet-env
          env:
            - name: CRUSHER_ID
              value: crusher-2
            - name: INITIAL_FILL_PCT
              value: "15"
          resources:
