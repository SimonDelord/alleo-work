# Shared env for truck agents and mqtt-ingest (non-secret).
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: truck-fleet-env
  namespace: truck-fleet
data:
  MQTT_HOST: "mqtt-broker"
  MQTT_PORT: "1883"
  MQTT_TOPIC_PREFIX: "fleet/trucks"
  MQTT_TOPIC_SUBSCRIBE: "fleet/trucks/+/telemetry"
  MQTT_NEW_DESTINATION_TOPIC: "new-destination"
  VALID_CRUSHERS: "crusher-1,crusher-2"
  PGHOST: "postgresql"
  PGPORT: "5432"
  PGDATABASE: "truckfleet"
  PGUSER: "truckfleet"
  TICK_SEC: "2.0"
---
# Demo credentials — replace in production; not committed as real secrets.
apiVersion: v1
kind: Secret
metadata:
  name: postgresql-credentials
  namespace: truck-fleet
type: Opaque
stringData:
  POSTGRES_USER: "truckfleet"
  POSTGRES_PASSWORD: "truckfleet-demo"
  POSTGRES_DB: "truckfleet"
  PGPASSWORD: "truckfleet-demo"
---
# Mosquitto: allow anonymous pub/sub on port 1883 (demo only).
apiVersion: v1
kind: ConfigMap
metadata:
  name: mosquitto-config
  namespace: truck-fleet
data:
  mosquitto.conf: |
    listener 1883
    allow_anonymous true
    persistence false
    log_dest stdout